<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Ads Runner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    body {
      background-color: #0d0b14;
      background-image:
        radial-gradient(ellipse at 50% 0%,  rgba(245,158,11,0.13) 0, transparent 60%),
        radial-gradient(ellipse at 0%  100%, rgba(139,92,246,0.08) 0, transparent 50%);
      background-attachment: fixed;
    }
    .glass-card {
      background: rgba(22,18,31,0.85);
      border: 1px solid rgba(251,146,60,0.12);
      backdrop-filter: blur(20px);
    }
    .role-card {
      cursor: pointer;
      border: 2px solid rgba(71,63,90,0.5);
      background: rgba(13,11,20,0.6);
      backdrop-filter: blur(8px);
      transition: all .2s;
      border-radius: 14px;
    }
    .role-card:hover { border-color: rgba(251,146,60,0.35); }
    .role-card.selected-Customer   { border-color: #10b981; background: rgba(6,78,59,.25); }
    .role-card.selected-Influencer { border-color: #a78bfa; background: rgba(59,7,100,.20); }
    .role-card.selected-AdPublisher{ border-color: #fb923c; background: rgba(120,53,15,.25); }
    .warm-input {
      background: rgba(13,11,20,0.7);
      border: 1px solid rgba(71,63,90,0.5);
      color: #f1f0f5;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 14px;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .warm-input:focus {
      outline: none;
      border-color: rgba(251,146,60,0.6);
      box-shadow: 0 0 0 3px rgba(251,146,60,0.10);
    }
    .warm-input::placeholder { color: #5a5270; }
    .btn-primary {
      background: linear-gradient(135deg, #f59e0b 0%, #fb923c 100%);
      color: #fff;
      font-weight: 700;
      border-radius: 12px;
      padding: 12px 20px;
      width: 100%;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(245,158,11,0.25);
      font-size: 14px;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(245,158,11,0.35); }
  </style>
</head>
<body class="text-slate-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md space-y-5">
    <!-- Logo -->
    <div class="text-center">
      <div class="inline-flex items-center gap-3 mb-3">
        <div class="p-3 rounded-2xl shadow-lg" style="background:linear-gradient(135deg,#f59e0b,#fb923c);box-shadow:0 0 24px rgba(245,158,11,.3)">
          <i data-lucide="play-circle" class="h-6 w-6 text-white"></i>
        </div>
        <div class="text-left">
          <span class="block font-extrabold text-2xl" style="background:linear-gradient(135deg,#fbbf24,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Ads Runner</span>
          <span class="text-[10px] text-amber-400/70 uppercase tracking-widest">Professional Network</span>
        </div>
      </div>
      <h1 class="text-xl font-bold text-white">Create your account</h1>
      <p class="text-slate-400 text-sm mt-1">Join the Ads Runner community</p>
    </div>

    <!-- Form Card -->
    <div class="glass-card rounded-2xl p-7 shadow-2xl space-y-5">

      {% if error %}
      <div class="p-3 bg-red-950/20 border border-red-500/30 text-red-300 text-xs rounded-xl flex items-center gap-2">
        <i data-lucide="alert-circle" class="h-4 w-4 shrink-0"></i> {{ error }}
      </div>
      {% endif %}

      <form method="POST" class="space-y-5">

        <!-- Role Selection -->
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">I am joining as a...</label>
          <div class="grid grid-cols-3 gap-3">
            <label class="role-card p-3 text-center" id="role-Customer">
              <input type="radio" name="role" value="Customer" class="sr-only" onchange="selectRole('Customer')" required>
              <i data-lucide="user" class="h-6 w-6 text-emerald-400 mx-auto mb-1.5"></i>
              <p class="text-xs font-bold text-white">Customer</p>
              <p class="text-[9px] text-slate-500 mt-0.5">Buy & discover</p>
            </label>
            <label class="role-card p-3 text-center" id="role-Influencer">
              <input type="radio" name="role" value="Influencer" class="sr-only" onchange="selectRole('Influencer')">
              <i data-lucide="star" class="h-6 w-6 text-violet-400 mx-auto mb-1.5"></i>
              <p class="text-xs font-bold text-white">Influencer</p>
              <p class="text-[9px] text-slate-500 mt-0.5">Create content</p>
            </label>
            <label class="role-card p-3 text-center" id="role-AdPublisher">
              <input type="radio" name="role" value="AdPublisher" class="sr-only" onchange="selectRole('AdPublisher')">
              <i data-lucide="megaphone" class="h-6 w-6 text-orange-400 mx-auto mb-1.5"></i>
              <p class="text-xs font-bold text-white">Publisher</p>
              <p class="text-[9px] text-slate-500 mt-0.5">Run ad slots</p>
            </label>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Full Name</label>
          <input name="name" type="text" required placeholder="Your name" class="warm-input">
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Headline / Tagline</label>
          <input name="tagline" type="text" placeholder="e.g. Digital Marketing Enthusiast" class="warm-input">
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Email Address</label>
          <input name="email" type="email" required placeholder="you@example.com" class="warm-input">
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Password</label>
          <input name="password" type="password" required placeholder="Min 6 characters" class="warm-input">
        </div>

        <button type="submit" class="btn-primary">
          Join Ads Runner →
        </button>
      </form>

      <p class="text-center text-xs text-slate-500">Already have an account? <a href="/login" class="text-amber-400 hover:text-amber-300 font-semibold transition-colors">Sign in</a></p>
    </div>
  </div>

  <script>
    function selectRole(role) {
      ['Customer','Influencer','AdPublisher'].forEach(r => {
        document.getElementById('role-'+r).classList.remove('selected-Customer','selected-Influencer','selected-AdPublisher');
      });
      document.getElementById('role-'+role).classList.add('selected-'+role);
    }
  </script>
  <script>lucide.createIcons();</script>
</body>
</html>
