<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Ads Runner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              950: '#0d0b14',
              900: '#16121f',
              800: '#221c2e',
              700: '#2e2640',
            }
          },
          boxShadow: {
            'glow-amber': '0 0 22px rgba(251,146,60,0.22)',
            'glow-warm':  '0 0 30px rgba(245,158,11,0.14)',
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    body {
      background-color: #0d0b14;
      background-image:
        radial-gradient(ellipse at 15% 20%, rgba(251,146,60,0.13) 0px, transparent 55%),
        radial-gradient(ellipse at 85% 10%, rgba(139,92,246,0.10) 0px, transparent 50%),
        radial-gradient(ellipse at 50% 95%, rgba(245,158,11,0.08) 0px, transparent 55%);
      background-attachment: fixed;
    }
    .glass-card {
      background: rgba(22,18,31,0.85);
      border: 1px solid rgba(251,146,60,0.12);
      backdrop-filter: blur(20px);
    }
    .warm-input {
      background: rgba(13,11,20,0.7);
      border: 1px solid rgba(71,63,90,0.5);
      color: #f1f0f5;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .warm-input:focus {
      outline: none;
      border-color: rgba(251,146,60,0.6);
      box-shadow: 0 0 0 3px rgba(251,146,60,0.10);
    }
    .warm-input::placeholder { color: #5a5270; }
    .btn-primary {
      background: linear-gradient(135deg, #f59e0b 0%, #fb923c 100%);
      color: #fff;
      font-weight: 700;
      border-radius: 12px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(245,158,11,0.25);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(245,158,11,0.35);
    }
    .btn-primary:active { transform: translateY(0); }
    .logo-ring {
      background: linear-gradient(135deg, #f59e0b, #fb923c);
      box-shadow: 0 0 24px rgba(245,158,11,0.30);
    }
  </style>
</head>
<body class="text-slate-100 min-h-full flex items-center justify-center p-4">

  <div class="w-full max-w-sm glass-card rounded-3xl p-8 shadow-2xl space-y-6">

    <!-- Branding -->
    <div class="text-center space-y-3">
      <div class="inline-flex p-3.5 logo-ring rounded-2xl mb-1">
        <i data-lucide="play-circle" class="h-7 w-7 text-white"></i>
      </div>
      <div>
        <h2 class="text-2xl font-extrabold text-white tracking-tight">Ads Runner</h2>
        <p class="text-slate-400 text-sm mt-1">Welcome back! Sign in to continue.</p>
      </div>
    </div>

    <!-- Error alert -->
    {% if error %}
    <div class="p-3.5 bg-red-950/30 border border-red-500/25 text-red-300 text-xs rounded-xl flex items-center gap-2">
      <i data-lucide="alert-circle" class="h-4 w-4 shrink-0"></i>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <!-- Form -->
    <form action="/login" method="POST" class="space-y-4">
      <div>
        <label for="email" class="block text-xs font-semibold text-slate-400 mb-1.5 tracking-wide">Email Address</label>
        <input
          type="email" id="email" name="email"
          placeholder="you@example.com"
          class="warm-input w-full rounded-xl py-2.5 px-4 text-sm"
          required
        />
      </div>

      <div>
        <label for="password" class="block text-xs font-semibold text-slate-400 mb-1.5 tracking-wide">Password</label>
        <input
          type="password" id="password" name="password"
          placeholder="••••••••"
          class="warm-input w-full rounded-xl py-2.5 px-4 text-sm"
          required
        />
      </div>

      <button type="submit" class="btn-primary w-full py-3 px-4 text-sm mt-1">
        Sign In →
      </button>
    </form>

    <!-- Footer -->
    <div class="text-center pt-2 border-t border-white/5">
      <p class="text-slate-500 text-xs">
        No account?
        <a href="/signup" class="text-amber-400 hover:text-amber-300 font-semibold ml-1 transition-colors">
          Create one free
        </a>
      </p>
      <div class="mt-3 text-[10px] text-slate-600">
        Demo: user@adsrunner.io · pwd: userpassword
      </div>
    </div>

  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
