version: '3.8'

services:
  # Flask Application
  web:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    container_name: marketing-ai-web
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key}
      - DATABASE_URL=sqlite:///database/marketing.db
      - OLLAMA_URL=http://ollama:11434/api
      - OLLAMA_MODEL=qwen2.5:0.5b
    volumes:
      - ../../database:/app/database
      - ../../frontend/static/uploads:/app/frontend/static/uploads
    depends_on:
      - ollama
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Ollama AI Service
  ollama:
    image: ollama/ollama:latest
    container_name: marketing-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: marketing-ai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../frontend/static:/usr/share/nginx/html/static:ro
      - nginx-ssl:/etc/nginx/ssl
    depends_on:
      - web
    networks:
      - app-network
    restart: unless-stopped

  # PostgreSQL (Optional - for production)
  # Uncomment if you want to use PostgreSQL instead of SQLite
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: marketing-ai-db
  #   environment:
  #     - POSTGRES_DB=marketing_ai
  #     - POSTGRES_USER=marketing_user
  #     - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - app-network
  #   restart: unless-stopped

  # Redis Cache (Optional)
  # redis:
  #   image: redis:7-alpine
  #   container_name: marketing-ai-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - app-network
  #   restart: unless-stopped

volumes:
  ollama-data:
    driver: local
  nginx-ssl:
    driver: local
  # postgres-data:
  #   driver: local
  # redis-data:
  #   driver: local

networks:
  app-network:
    driver: bridge
