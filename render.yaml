# render.yaml — Render.com Deployment Configuration
# Docs: https://render.com/docs/render-yaml

services:
  - type: web
    name: seo-marketing-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: SESSION_COOKIE_HTTPONLY
        value: "True"
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
      - key: PERMANENT_SESSION_LIFETIME
        value: "3600"
      - key: MAX_UPLOAD_SIZE
        value: "10485760"
      # ─── SET THESE IN RENDER DASHBOARD (Environment tab) ───
      # SECRET_KEY       → any long random string
      # GEMINI_API_KEY   → get FREE key at https://aistudio.google.com/apikey
      # OPENAI_API_KEY   → optional paid fallback (starts with sk-)
